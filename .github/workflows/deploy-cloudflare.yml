# Wypchnij Worker (API) i statyczny front na Cloudflare Pages.
# Wymaga w repozytorium: Settings → Secrets → CLOUDFLARE_API_TOKEN (Edit Cloudflare Workers + Pages).
# Opcjonalnie: Settings → Variables → CF_PAGES_PROJECT_NAME (domyślnie: dungeon-of-echoes — jak w dashboardzie CF).
name: Deploy Cloudflare

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  worker:
    name: Worker API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cf-worker/package-lock.json
      - name: Install & deploy
        working-directory: cf-worker
        run: npm ci && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  pages:
    name: Pages (React build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build
        working-directory: frontend
        run: npm ci && npm run build
      - name: Deploy
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          PROJECT_NAME="${{ vars.CF_PAGES_PROJECT_NAME }}"
          if [ -z "$PROJECT_NAME" ]; then PROJECT_NAME=dungeon-of-echoes; fi
          npx wrangler pages deploy build --project-name="$PROJECT_NAME"
